<!-- Dark / Light mode toggle -->
<style>
  .theme-toggle {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    z-index: 1000;
    background: var(--body-background-color);
    border: 1px solid var(--border-color);
    border-radius: 50%;
    width: 2.5rem;
    height: 2.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transition: background 0.2s;
  }
  .theme-toggle:hover {
    opacity: 0.8;
  }
</style>

<script>
  (function() {
    var saved = localStorage.getItem("jtd-theme") || "light";
    document.documentElement.setAttribute("data-theme", saved);
    jtdSetTheme(saved);

    function jtdSetTheme(scheme) {
      // just-the-docs uses a class on <body>: "light" or "dark"
      // and exposes jtd.setTheme() in v0.10
      if (typeof jtd !== "undefined" && jtd.setTheme) {
        jtd.setTheme(scheme);
      } else {
        // Fallback: swap the <link> data-color-scheme or set attribute
        document.documentElement.setAttribute("data-theme", scheme);
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      var scheme = localStorage.getItem("jtd-theme") || "light";

      // Apply saved scheme via jtd API if available
      if (typeof jtd !== "undefined" && jtd.setTheme) {
        jtd.setTheme(scheme);
      }

      // Create toggle button
      var btn = document.createElement("button");
      btn.className = "theme-toggle";
      btn.setAttribute("aria-label", "Toggle dark mode");
      btn.textContent = scheme === "dark" ? "☀️" : "🌙";
      document.body.appendChild(btn);

      btn.addEventListener("click", function() {
        var current = localStorage.getItem("jtd-theme") || "light";
        var next = current === "dark" ? "light" : "dark";
        localStorage.setItem("jtd-theme", next);
        btn.textContent = next === "dark" ? "☀️" : "🌙";

        if (typeof jtd !== "undefined" && jtd.setTheme) {
          jtd.setTheme(next);
        } else {
          // Hard fallback: reload with new scheme
          document.documentElement.setAttribute("data-theme", next);
          location.reload();
        }
      });
    });
  })();
</script>
